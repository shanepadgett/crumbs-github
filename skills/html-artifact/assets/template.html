<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Artifact title</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Arc Lite tokens. Do not edit token values. */
      :root {
        --color-primary: #0275d4;
        --color-primary-hover: #015397;
        --color-primary-active: #013159;
        --color-on-primary: #ffffff;
        --color-primary-container: #e6f1fb;
        --color-primary-container-hover: #b1d4f2;
        --color-primary-container-active: #8bc0eb;
        --color-on-primary-container: #013159;
        --color-secondary: #949494;
        --color-secondary-hover: #757575;
        --color-secondary-active: #666666;
        --color-on-secondary: #000000;
        --color-tertiary: #1c89a1;
        --color-on-tertiary: #000000;
        --color-tertiary-strong: #197d93;
        --color-on-tertiary-strong: #ffffff;
        --color-tertiary-container: #e8f3f6;
        --color-on-tertiary-container: #0c3a44;
        --color-accent: #ff6100;
        --color-on-accent: #2e2e2e;
        --color-accent-strong: #b54500;
        --color-on-accent-strong: #ffffff;
        --color-accent-container: #ffefe6;
        --color-on-accent-container: #6b2900;
        --color-background: #ebebeb;
        --color-surface: #ffffff;
        --color-on-surface: #2e2e2e;
        --color-surface-hover: #f5f5f5;
        --color-surface-active: #ebebeb;
        --color-surface-subtle: #ebebeb;
        --color-surface-subtle-hover: #bfbfbf;
        --color-surface-subtle-active: #b0b0b0;
        --color-surface-inverse: #dedede;
        --color-border: #949494;
        --color-border-subtle: #dedede;
        --color-border-strong: #666666;
        --color-text: #2e2e2e;
        --color-text-strong: #000000;
        --color-text-muted: #4a4a4a;
        --color-text-subtle: #757575;
        --color-text-disabled: #b0b0b0;
        --color-text-inverse: #ffffff;
        --color-success: #118647;
        --color-on-success: #ffffff;
        --color-warning: #ffab00;
        --color-on-warning: #2e2e2e;
        --color-danger: #ca0d0d;
        --color-danger-hover: #b80c0c;
        --color-danger-active: #8f0909;
        --color-on-danger: #ffffff;
        --color-disabled: #dedede;
        --color-on-disabled: #b0b0b0;
        --color-focus: #ffab00;
        --color-info: #0275d4;
        --color-brand-purple: #4e2e82;
        --color-brand-lite-purple: #9c28b1;
        --text-display: 42px;
        --text-h1: 32px;
        --text-h2: 24px;
        --text-h3: 18px;
        --text-body: 16px;
        --text-body-strong: 16px;
        --text-compact: 14px;
        --text-label: 12px;
        --text-caption: 12px;
        --text-micro: 10px;
        --text-mono: 12px;
        --leading-display: 48px;
        --leading-h1: 36px;
        --leading-h2: 28px;
        --leading-h3: 24px;
        --leading-body: 24px;
        --leading-body-strong: 24px;
        --leading-compact: 20px;
        --leading-label: 16px;
        --leading-caption: 16px;
        --leading-micro: 12px;
        --leading-mono: 16px;
        --tracking-display: 0;
        --tracking-h1: 0;
        --tracking-h2: 0;
        --tracking-h3: 0;
        --tracking-body: 0;
        --tracking-body-strong: 0;
        --tracking-compact: 0;
        --tracking-label: 0;
        --tracking-caption: 0;
        --tracking-micro: 0;
        --tracking-mono: 0;
        --font-weight-display: 600;
        --font-weight-h1: 600;
        --font-weight-h2: 600;
        --font-weight-h3: 600;
        --font-weight-body: 400;
        --font-weight-body-strong: 600;
        --font-weight-compact: 400;
        --font-weight-label: 600;
        --font-weight-caption: 400;
        --font-weight-micro: 400;
        --font-weight-mono: 400;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-0: 0px;
        --spacing-1: 1px;
        --spacing-2: 2px;
        --spacing-3: 4px;
        --spacing-4: 8px;
        --spacing-5: 12px;
        --spacing-6: 16px;
        --spacing-7: 20px;
        --spacing-8: 24px;
        --spacing-9: 32px;
        --spacing-10: 42px;
        --spacing-11: 54px;
        --spacing-12: 68px;
        --spacing-13: 84px;
        --spacing-14: 128px;
        --radius-none: 0px;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-full: 999px;
        --radius-secondary: 4px;
        --radius-primary: 8px;
        --radius-large: 16px;
        --radius-rounded: 999px;
        --font-sans:
          "Source Sans 3", "Source Sans Pro", Inter, "SF Pro Text", "Segoe UI", sans-serif;
        --font-serif: "Source Serif 4", "Source Serif Pro", Georgia, serif;
        --font-mono: SFMono-Regular, Consolas, "Liberation Mono", monospace;
      }

      [data-theme="dark"] {
        --color-primary: #e6f1fb;
        --color-primary-hover: #b1d4f2;
        --color-primary-active: #8bc0eb;
        --color-on-primary: #013159;
        --color-primary-container: #0275d4;
        --color-primary-container-hover: #026ac1;
        --color-primary-container-active: #015397;
        --color-on-primary-container: #ffffff;
        --color-secondary: #ebebeb;
        --color-secondary-hover: #f5f5f5;
        --color-secondary-active: #fafafa;
        --color-on-secondary: #2e2e2e;
        --color-tertiary: #e8f3f6;
        --color-on-tertiary: #2e2e2e;
        --color-tertiary-strong: #e8f3f6;
        --color-on-tertiary-strong: #2e2e2e;
        --color-tertiary-container: #1c89a1;
        --color-on-tertiary-container: #000000;
        --color-accent: #ffefe6;
        --color-on-accent: #2e2e2e;
        --color-accent-strong: #ffefe6;
        --color-on-accent-strong: #2e2e2e;
        --color-accent-container: #ff6100;
        --color-on-accent-container: #000000;
        --color-background: #3b3b3b;
        --color-surface: #2e2e2e;
        --color-on-surface: #ffffff;
        --color-surface-hover: #1c1c1c;
        --color-surface-active: #0d0d0d;
        --color-surface-subtle: #1c1c1c;
        --color-surface-subtle-hover: #0d0d0d;
        --color-surface-subtle-active: #000000;
        --color-surface-inverse: #4a4a4a;
        --color-border: #ebebeb;
        --color-border-subtle: #4a4a4a;
        --color-border-strong: #2e2e2e;
        --color-text: #ffffff;
        --color-text-strong: #ffffff;
        --color-text-muted: #ebebeb;
        --color-text-subtle: #ebebeb;
        --color-text-disabled: #949494;
        --color-text-inverse: #0d0d0d;
        --color-success: #e7f3ed;
        --color-on-success: #2e2e2e;
        --color-warning: #fff7e6;
        --color-on-warning: #2e2e2e;
        --color-danger: #fae7e7;
        --color-danger-hover: #efb4b4;
        --color-danger-active: #e79090;
        --color-on-danger: #ca0d0d;
        --color-disabled: #000000;
        --color-on-disabled: #2e2e2e;
        --color-focus: #ffab00;
        --color-info: #e6f1fb;
        --color-brand-purple: #edeaf3;
        --color-brand-lite-purple: #f5eaf7;
      }

      * {
        box-sizing: border-box;
      }

      html {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        background: var(--color-background);
        color: var(--color-text);
        font-family: var(--font-sans);
        font-size: var(--text-body);
        line-height: var(--leading-body);
      }

      a {
        color: var(--color-primary);
      }

      :focus-visible {
        outline: 3px solid var(--color-focus);
        outline-offset: 2px;
      }

      h1,
      h2,
      h3,
      p {
        margin-block: 0;
      }

      h1 {
        font-size: var(--text-h1);
        line-height: var(--leading-h1);
        font-weight: var(--font-weight-h1);
        color: var(--color-text-strong);
      }
      h2 {
        font-size: var(--text-h2);
        line-height: var(--leading-h2);
        font-weight: var(--font-weight-h2);
        color: var(--color-text-strong);
      }
      h3 {
        font-size: var(--text-h3);
        line-height: var(--leading-h3);
        font-weight: var(--font-weight-h3);
        color: var(--color-text-strong);
      }

      code,
      pre,
      .mono {
        font-family: var(--font-mono);
        font-size: var(--text-mono);
        line-height: var(--leading-mono);
      }

      .app-shell {
        min-height: 100vh;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--spacing-6);
        padding: var(--spacing-5) var(--spacing-8);
        background: color-mix(in srgb, var(--color-surface) 94%, transparent);
        border-bottom: 1px solid var(--color-border-subtle);
        backdrop-filter: blur(12px);
      }

      .topbar-title {
        display: grid;
        gap: var(--spacing-2);
      }
      .topbar-title strong {
        color: var(--color-text-strong);
        font-size: var(--text-h3);
        line-height: var(--leading-h3);
      }
      .topbar-title span {
        color: var(--color-text-muted);
        font-size: var(--text-compact);
        line-height: var(--leading-compact);
      }

      .container {
        width: min(1180px, 100%);
        margin: 0 auto;
        padding: var(--spacing-8);
      }

      .section {
        margin-block: var(--spacing-8);
      }
      .stack {
        display: grid;
        gap: var(--spacing-6);
      }
      .stack-sm {
        display: grid;
        gap: var(--spacing-4);
      }
      .cluster {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: var(--spacing-4);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: var(--spacing-4);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(260px, 100%), 1fr));
        gap: var(--spacing-6);
      }
      .split {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 0.7fr);
        gap: var(--spacing-6);
        align-items: start;
      }
      .sidebar-layout {
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr);
        gap: var(--spacing-6);
        align-items: start;
      }

      .panel,
      .callout {
        background: var(--color-surface);
        color: var(--color-text);
        border: 1px solid var(--color-border-subtle);
        border-radius: var(--radius-primary);
        padding: var(--spacing-6);
      }

      .callout {
        border-left: 4px solid var(--color-primary);
      }
      .callout.warning {
        border-left-color: var(--color-warning);
      }
      .callout.danger {
        border-left-color: var(--color-danger);
      }
      .callout.success {
        border-left-color: var(--color-success);
      }

      .muted {
        color: var(--color-text-muted);
      }
      .subtle {
        color: var(--color-text-subtle);
      }
      .serif {
        font-family: var(--font-serif);
      }
      .caption {
        font-size: var(--text-caption);
        line-height: var(--leading-caption);
        color: var(--color-text-muted);
      }

      .button,
      button,
      input[type="button"],
      input[type="submit"] {
        appearance: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: 0 var(--spacing-6);
        border: 1px solid transparent;
        border-radius: var(--radius-primary);
        background: var(--color-primary);
        color: var(--color-on-primary);
        font: inherit;
        font-size: var(--text-label);
        line-height: var(--leading-label);
        font-weight: var(--font-weight-label);
        cursor: pointer;
        text-decoration: none;
      }

      .button:hover,
      button:hover {
        background: var(--color-primary-hover);
      }
      .button-secondary {
        background: var(--color-primary-container);
        color: var(--color-on-primary-container);
      }
      .button-secondary:hover {
        background: var(--color-primary-container-hover);
      }
      .button-danger {
        background: var(--color-danger);
        color: var(--color-on-danger);
      }
      .button-danger:hover {
        background: var(--color-danger-hover);
      }
      .button-ghost {
        background: transparent;
        color: var(--color-text);
        border-color: var(--color-border-subtle);
      }
      .button-ghost:hover {
        background: var(--color-surface-hover);
      }

      .field {
        display: grid;
        gap: var(--spacing-3);
      }
      .field label {
        color: var(--color-text-strong);
        font-size: var(--text-label);
        line-height: var(--leading-label);
        font-weight: var(--font-weight-label);
      }
      input,
      select,
      textarea {
        width: 100%;
        min-height: 40px;
        padding: var(--spacing-5);
        border: 1px solid var(--color-border-subtle);
        border-radius: var(--radius-secondary);
        background: var(--color-surface);
        color: var(--color-text);
        font: inherit;
        font-size: var(--text-compact);
        line-height: var(--leading-compact);
      }
      textarea {
        min-height: 120px;
        resize: vertical;
      }

      .badge,
      .chip {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        min-height: 24px;
        padding: var(--spacing-2) var(--spacing-4);
        border-radius: var(--radius-rounded);
        font-size: var(--text-caption);
        line-height: var(--leading-caption);
        color: var(--color-text-muted);
        background: var(--color-surface-subtle);
      }

      .status-success {
        background: var(--color-success);
        color: var(--color-on-success);
      }
      .status-warning {
        background: var(--color-warning);
        color: var(--color-on-warning);
      }
      .status-danger,
      .severity-blocker,
      .severity-major {
        background: var(--color-danger);
        color: var(--color-on-danger);
      }
      .status-info,
      .severity-minor {
        background: var(--color-primary-container);
        color: var(--color-on-primary-container);
      }
      .severity-note {
        background: var(--color-surface-subtle);
        color: var(--color-text-muted);
      }

      .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: var(--spacing-4);
      }
      .stat {
        padding: var(--spacing-5);
        border: 1px solid var(--color-border-subtle);
        border-radius: var(--radius-primary);
        background: var(--color-surface);
      }
      .stat-value {
        color: var(--color-text-strong);
        font-size: var(--text-h2);
        line-height: var(--leading-h2);
        font-weight: var(--font-weight-h2);
      }
      .stat-label {
        color: var(--color-text-muted);
        font-size: var(--text-caption);
        line-height: var(--leading-caption);
      }

      .table-wrap {
        overflow-x: auto;
        border: 1px solid var(--color-border-subtle);
        border-radius: var(--radius-primary);
        background: var(--color-surface);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: var(--text-compact);
        line-height: var(--leading-compact);
      }
      th,
      td {
        padding: var(--spacing-4) var(--spacing-5);
        text-align: left;
        border-bottom: 1px solid var(--color-border-subtle);
        vertical-align: top;
      }
      th {
        color: var(--color-text-strong);
        background: var(--color-surface-subtle);
        font-weight: var(--font-weight-label);
      }
      tr:last-child td {
        border-bottom: 0;
      }

      details {
        border: 1px solid var(--color-border-subtle);
        border-radius: var(--radius-primary);
        background: var(--color-surface);
      }
      details + details {
        margin-top: var(--spacing-4);
      }
      summary {
        cursor: pointer;
        padding: var(--spacing-5) var(--spacing-6);
        color: var(--color-text-strong);
        font-weight: var(--font-weight-h3);
      }
      details > :not(summary) {
        margin: 0 var(--spacing-6) var(--spacing-6);
      }

      dialog {
        max-width: min(720px, calc(100% - var(--spacing-8)));
        border: 1px solid var(--color-border-subtle);
        border-radius: var(--radius-large);
        background: var(--color-surface);
        color: var(--color-text);
        padding: var(--spacing-6);
      }
      dialog::backdrop {
        background: rgb(0 0 0 / 45%);
      }

      .code-block {
        overflow-x: auto;
        padding: var(--spacing-5);
        border: 1px solid var(--color-border-subtle);
        border-radius: var(--radius-primary);
        background: var(--color-surface-subtle);
        color: var(--color-text);
        white-space: pre;
      }

      .timeline {
        display: grid;
        gap: var(--spacing-4);
        border-left: 2px solid var(--color-border-subtle);
        padding-left: var(--spacing-6);
      }
      .timeline-item {
        position: relative;
      }
      .timeline-item::before {
        content: "";
        position: absolute;
        left: calc(-1 * var(--spacing-6) - 5px);
        top: 0.45em;
        width: 10px;
        height: 10px;
        border-radius: var(--radius-rounded);
        background: var(--color-primary);
      }

      .flow {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: var(--spacing-4);
      }
      .flow-step {
        padding: var(--spacing-4) var(--spacing-5);
        border: 1px solid var(--color-border-subtle);
        border-radius: var(--radius-primary);
        background: var(--color-surface);
      }
      .flow-arrow {
        color: var(--color-text-muted);
      }

      .diagram {
        width: 100%;
        height: auto;
        color: var(--color-text);
      }
      .diagram .node {
        fill: var(--color-surface);
        stroke: var(--color-border);
        stroke-width: 1.5;
      }
      .diagram .node-primary {
        fill: var(--color-primary-container);
        stroke: var(--color-primary);
      }
      .diagram .edge {
        fill: none;
        stroke: var(--color-border-strong);
        stroke-width: 1.5;
        marker-end: url(#arrow);
      }
      .diagram .label {
        fill: var(--color-text);
        font: 600 12px var(--font-sans);
      }
      .diagram .caption {
        fill: var(--color-text-muted);
        font: 400 12px var(--font-sans);
      }

      /* Add artifact-specific CSS below this line. */

      @media (max-width: 760px) {
        .topbar {
          position: static;
          align-items: flex-start;
          padding: var(--spacing-5);
        }
        .container {
          padding: var(--spacing-5);
        }
        .split,
        .sidebar-layout {
          grid-template-columns: 1fr;
        }
        .toolbar {
          align-items: stretch;
        }
        .toolbar > * {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-title">
          <strong>Artifact title</strong>
          <span>Short purpose statement</span>
        </div>
        <button
          class="button button-ghost"
          type="button"
          data-theme-toggle
          aria-label="Toggle color theme"
        >
          Theme
        </button>
      </header>

      <main class="container stack">
        <!-- Replace shell content below. Use existing classes first; add artifact CSS only in marked style section. -->
        <section class="panel stack-sm">
          <h1>Artifact title</h1>
          <p class="muted">Replace this starter content with the artifact.</p>
        </section>
      </main>
    </div>

    <script>
      (() => {
        const storageKey = "arc-lite-theme";
        const root = document.documentElement;

        const preferredTheme = () => {
          const saved = localStorage.getItem(storageKey);
          if (saved === "light" || saved === "dark") return saved;
          return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        };

        const applyTheme = (theme) => {
          root.dataset.theme = theme;
          root.style.colorScheme = theme;
          document.querySelectorAll("[data-theme-toggle]").forEach((button) => {
            button.textContent = theme === "dark" ? "Light" : "Dark";
            button.setAttribute(
              "aria-label",
              `Switch to ${theme === "dark" ? "light" : "dark"} theme`,
            );
          });
        };

        applyTheme(preferredTheme());

        document.addEventListener("click", async (event) => {
          const themeButton = event.target.closest("[data-theme-toggle]");
          if (themeButton) {
            const nextTheme = root.dataset.theme === "dark" ? "light" : "dark";
            localStorage.setItem(storageKey, nextTheme);
            applyTheme(nextTheme);
            return;
          }

          const copyButton = event.target.closest("[data-copy-target]");
          if (!copyButton) return;

          const target = document.querySelector(copyButton.dataset.copyTarget);
          if (!target) return;

          const originalText = copyButton.textContent;
          await navigator.clipboard.writeText(target.textContent.trim());
          copyButton.textContent = "Copied";
          setTimeout(() => {
            copyButton.textContent = originalText;
          }, 1200);
        });
      })();
    </script>
  </body>
</html>
